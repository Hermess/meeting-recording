services:
  postgres:
    image: postgres:16-alpine
    container_name: meeting-ai-kit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_ai
      POSTGRES_USER: meeting_ai
      POSTGRES_PASSWORD: meeting_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting_ai -d meeting_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
